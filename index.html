<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestor de Asientos de Cine</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">
  </head>
  <body class="min-h-screen bg-slate-100 flex flex-col items-center justify-center">
    <main class="w-full max-w-3xl flex flex-col items-center gap-8 p-6">
      <h1 class="text-4xl font-bold text-center mb-2">Gestor de Asientos de Cine</h1>
      <div class="w-full flex flex-col items-center">
        <div class="bg-slate-300 rounded-t-xl w-full max-w-2xl h-10 flex items-center justify-center text-lg font-semibold text-slate-700 mb-2 shadow-inner">
          Pantalla de cine
        </div>
        <div class="overflow-x-auto">
          <table class="border-separate border-spacing-2 bg-white p-6 rounded-b-2xl shadow-lg border border-slate-200">
            <thead>
              <tr>
                <th class="w-10 h-10"></th>
                <!-- Números de columna -->
                <th class="w-10 h-10 text-center text-slate-700 font-semibold">1</th>
                <th class="w-10 h-10 text-center text-slate-700 font-semibold">2</th>
                <th class="w-10 h-10 text-center text-slate-700 font-semibold">3</th>
                <th class="w-10 h-10 text-center text-slate-700 font-semibold">4</th>
                <th class="w-10 h-10 text-center text-slate-700 font-semibold">5</th>
                <th class="w-10 h-10 text-center text-slate-700 font-semibold">6</th>
                <th class="w-10 h-10 text-center text-slate-700 font-semibold">7</th>
                <th class="w-10 h-10 text-center text-slate-700 font-semibold">8</th>
                <th class="w-10 h-10 text-center text-slate-700 font-semibold">9</th>
                <th class="w-10 h-10 text-center text-slate-700 font-semibold">10</th>
              </tr>
            </thead>
            <tbody id="cine-grid"></tbody>
          </table>
        </div>
      </div>
      <div id="conteo-asientos" class="mt-4 text-lg font-semibold text-slate-700"></div>
      <button id="buscar-contiguos" class="mt-4 px-6 py-2 bg-blue-600 text-white font-semibold rounded-lg shadow hover:bg-blue-700 transition">Buscar 2 asientos contiguos</button>
      <div id="mensaje" class="mt-2 text-center text-base text-slate-700"></div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
